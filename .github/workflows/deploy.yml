name: Deploy Frontend to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Zip build artifact
      run: |
        cd dist
        zip -r ../qurban_build.zip .
        cd ..

    - name: Copy files to VPS via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        source: "qurban_build.zip"
        target: "/tmp"
        overwrite: true

    - name: Execute remote SSH commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S mkdir -p /var/www/qurban-dkm
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S rm -rf /var/www/qurban-dkm/*
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S unzip -o /tmp/qurban_build.zip -d /var/www/qurban-dkm/
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S chown -R www-data:www-data /var/www/qurban-dkm/
          echo '${{ secrets.VPS_PASSWORD }}' | sudo -S rm -f /tmp/qurban_build.zip
